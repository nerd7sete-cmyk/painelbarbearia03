<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Master</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b141a;
color:#fff;
}

/* 🔥 CONTAINER */
.container{
max-width:480px;
margin:auto;
padding:20px 16px;
}

/* HEADER */
.topo{
background: linear-gradient(145deg,#1a242c,#111b21);
padding:18px;
border-radius:18px;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
box-shadow:0 8px 25px rgba(0,0,0,0.5);
}

.nome{
font-size:18px;
font-weight:700;
}

.sub{
font-size:12px;
opacity:0.6;
margin-top:2px;
}

.logout{
background:#0f1720;
border:1px solid rgba(255,255,255,0.1);
color:#fff;
padding:10px 14px;
border-radius:12px;
cursor:pointer;
transition:0.3s;
}

.logout:hover{
background:#ff3b3b;
border-color:#ff3b3b;
}

/* 🔥 GRID MAIS PROFISSIONAL */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

/* 🔥 CARD PREMIUM */
.card{
padding:22px;
border-radius:22px;
background: linear-gradient(145deg,#1a242c,#111b21);
border:1px solid rgba(255,255,255,0.06);
cursor:pointer;
position:relative;
transition:all 0.25s ease;

display:flex;
flex-direction:column;
justify-content:center;

min-height:120px;

box-shadow:0 6px 18px rgba(0,0,0,0.4);
}

/* HOVER SUAVE */
.card:hover{
transform:translateY(-6px);
box-shadow:0 12px 25px rgba(0,0,0,0.7);
}

/* LINHA PREMIUM */
.card::after{
content:"";
position:absolute;
bottom:0;
left:0;
width:100%;
height:3px;
background:linear-gradient(90deg,#ffd700,#ffb700);
opacity:0.8;
border-radius:0 0 22px 22px;
}

/* TEXTOS */
.titulo{
font-size:16px;
font-weight:700;
}

.subinfo{
font-size:13px;
opacity:0.6;
margin-top:6px;
}
</style>
</head>

<body>

<div class="container">

<div class="topo">
<div>
<div class="nome">Painel Master 👑</div>
<div class="sub">Controle total do sistema</div>
</div>

<button class="logout" onclick="logout()">Sair</button>
</div>

<div class="grid" id="grid"></div>

</div>

<script>

function ir(p){
window.location.href = "./" + p;
}

//////////////////////////////////////////////////
// 🔥 BOTÕES
//////////////////////////////////////////////////

let menus = [
{ titulo:"Barbeiros", sub:"Gerenciar barbeiros", link:"barbeiros.html" },
{ titulo:"Criar Barbeiro", sub:"Adicionar novo", link:"criar-barbeiro.html" },
{ titulo:"Configuração", sub:"Renovação e planos", link:"config-renovacao.html" },
{ titulo:"Gráficos", sub:"Dados e desempenho", link:"graficomaster.html" }
];

//////////////////////////////////////////////////
// 🔥 RENDER
//////////////////////////////////////////////////

function render(){

let grid = document.getElementById("grid");
grid.innerHTML = "";

menus.forEach(m=>{

let card = document.createElement("div");
card.className = "card";
card.onclick = ()=> ir(m.link);

card.innerHTML = `
<div class="titulo">${m.titulo}</div>
<div class="subinfo">${m.sub}</div>
`;

grid.appendChild(card);

});

}

function logout(){
window.location.href = "./login.html";
}

render();

</script>

</body>
</html>
