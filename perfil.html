<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Perfil</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b141a;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

/* OVERLAY */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(12px);
display:flex;
justify-content:center;
align-items:center;
}

/* MODAL */
.modal{
width:100%;
max-width:380px;
background:linear-gradient(145deg,#1a242c,#111b21);
border-radius:26px;
padding:22px;
border:1px solid rgba(255,255,255,0.06);
box-shadow:0 20px 60px rgba(0,0,0,0.9);
animation:fadeUp 0.4s ease;
position:relative;
}

@keyframes fadeUp{
from{opacity:0; transform:translateY(40px);}
to{opacity:1; transform:translateY(0);}
}

/* FECHAR */
.fechar{
position:absolute;
top:12px;
left:12px;
background:rgba(255,255,255,0.05);
border-radius:50%;
width:34px;
height:34px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
border:1px solid rgba(255,255,255,0.1);
transition:0.3s;
}

.fechar:hover{
background:#ff3b3b;
}

/* TOPO */
.topo{
text-align:center;
margin-bottom:20px;
}

.avatar{
width:85px;
height:85px;
border-radius:50%;
background:linear-gradient(145deg,#00ff88,#00c96b);
display:flex;
align-items:center;
justify-content:center;
margin:auto;
box-shadow:0 0 25px rgba(0,255,136,0.6);
}

.avatar svg{
width:34px;
height:34px;
stroke:#000;
stroke-width:2;
fill:none;
}

.nome{
margin-top:12px;
font-size:18px;
font-weight:700;
}

.sub{
font-size:12px;
opacity:0.6;
}

/* INFO */
.info{
margin-top:10px;
}

.linha{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px;
background:#0f1720;
border-radius:14px;
margin-top:10px;
font-size:13px;
}

.linha-left{
display:flex;
align-items:center;
gap:10px;
opacity:0.85;
}

.linha svg{
width:18px;
height:18px;
stroke:#e5e7eb;
stroke-width:1.8;
fill:none;
}

/* BOTÕES (🔥 PADRÃO DO SISTEMA) */
.botoes{
margin-top:20px;
display:flex;
flex-direction:column;
gap:12px;
}

.btn{
padding:15px;
border-radius:16px;
font-weight:bold;
cursor:pointer;
transition:0.25s;
font-size:14px;
}

/* 🔥 BOTÃO PRINCIPAL (RENOVAR) */
.renovar{
background:#0f1720;
border:1px solid rgba(255,255,255,0.1);
color:#00ff88;
display:flex;
align-items:center;
justify-content:center;
gap:8px;
}

.renovar:hover{
transform:translateY(-2px);
border-color:#00ff88;
box-shadow:0 0 10px rgba(0,255,136,0.2);
}

/* 🔥 BOTÃO SAIR (DISCRETO) */
.sair{
background:#0f1720;
border:1px solid rgba(255,255,255,0.1);
color:#fff;
}

.sair:hover{
transform:translateY(-2px);
border-color:#ff3b3b;
color:#ff3b3b;
}
</style>
</head>

<body>

<div class="overlay">

<div class="modal">

<div class="fechar" onclick="voltar()">✕</div>

<div class="topo">

<div class="avatar">
<svg viewBox="0 0 24 24">
<circle cx="12" cy="8" r="4"/>
<path d="M4 20c1-4 6-4 8-4s7 0 8 4"/>
</svg>
</div>

<div class="nome" id="nome">Carregando...</div>
<div class="sub">Conta ativa</div>

</div>

<div class="info">

<div class="linha">
<div class="linha-left">
<svg viewBox="0 0 24 24">
<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.8 19.8 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.08 4.18 2 2 0 0 1 4.06 2h3a2 2 0 0 1 2 1.72c.12.89.32 1.76.59 2.6a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.48-1.11a2 2 0 0 1 2.11-.45c.84.27 1.71.47 2.6.59A2 2 0 0 1 22 16.92z"/>
</svg>
<span>WhatsApp</span>
</div>
<strong id="whatsapp">-</strong>
</div>

<div class="linha">
<div class="linha-left">
<svg viewBox="0 0 24 24">
<path d="M12 2l3 6 6 .9-4.5 4.4L18 20l-6-3-6 3 1.5-6.7L3 8.9 9 8z"/>
</svg>
<span>Plano</span>
</div>
<strong id="plano">-</strong>
</div>

<div class="linha">
<div class="linha-left">
<svg viewBox="0 0 24 24">
<circle cx="12" cy="12" r="9"/>
<path d="M12 7v5l3 2"/>
</svg>
<span>Validade</span>
</div>
<strong id="validade">-</strong>
</div>

</div>

<div class="botoes">

<button class="btn renovar" onclick="renovar()">
<svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:#00ff88;stroke-width:2;fill:none;">
<path d="M21 12a9 9 0 1 1-3-6.7"/>
<path d="M21 3v6h-6"/>
</svg>
Renovar plano
</button>

<button class="btn sair" onclick="logout()">
Sair
</button>

</div>

</div>

</div>

<script>

// DADOS
let dados = JSON.parse(localStorage.getItem("barbeiros")) || [];
let id = localStorage.getItem("barbeiroAtual");
let b = dados.find(x => x.id == id) || {};

// RENDER
function render(){

document.getElementById("nome").innerText = b.nome || "Barbeiro";
document.getElementById("whatsapp").innerText = b.whatsapp || "-";

let planos = {
"1mes":"Mensal",
"3meses":"Trimestral",
"1ano":"Anual"
};

document.getElementById("plano").innerText = planos[b.plano] || "-";

if(b.validade){
let data = new Date(b.validade);
document.getElementById("validade").innerText =
data.toLocaleDateString("pt-BR");
}

}

// AÇÕES
function voltar(){
window.location.href = "painel.html";
}

function logout(){
localStorage.removeItem("barbeiroAtual");
window.location.href = "login.html";
}

function renovar(){
window.location.href = "renovacao.html";
}

render();

</script>

</body>
</html>
