<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Criar Barbeiro PRO</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b141a;
color:#fff;
}

/* CONTAINER PADRÃO MASTER */
.container{
max-width:480px;
margin:auto;
padding:20px 16px;
}

/* HEADER MASTER */
.topo{
background: linear-gradient(145deg,#1a242c,#111b21);
padding:16px;
border-radius:18px;
display:flex;
align-items:center;
gap:12px;
margin-bottom:20px;
box-shadow:0 8px 25px rgba(0,0,0,0.5);
}

.voltar{
width:36px;
height:36px;
border-radius:10px;
background:#0f1720;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.voltar:hover{
background:#1f2a33;
}

.nome{
font-size:16px;
font-weight:700;
}

.sub{
font-size:12px;
opacity:0.6;
}

/* CARD */
.card{
background: linear-gradient(145deg,#1a242c,#111b21);
padding:18px;
border-radius:18px;
margin-bottom:16px;
border:1px solid rgba(255,255,255,0.05);
box-shadow:0 8px 25px rgba(0,0,0,0.6);
}

/* TITULO */
.titulo{
font-size:16px;
font-weight:bold;
margin-bottom:12px;
}

/* INPUT */
input{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
background:#0f1720;
color:#fff;
font-size:14px;
outline:none;
}

/* PLANOS */
.planos{
display:flex;
flex-direction:column;
gap:12px;
margin-top:10px;
}

.plano{
padding:14px;
border-radius:12px;
background:#0f1720;
border:1px solid rgba(255,255,255,0.08);
cursor:pointer;
transition:0.2s;
}

.plano:hover{
transform:scale(1.02);
}

.plano.ativo{
border:1px solid #00ff88;
box-shadow:0 0 12px rgba(0,255,136,0.3);
}

.plano strong{
display:block;
font-size:14px;
}

.plano span{
font-size:12px;
opacity:0.7;
}

/* BOTÃO */
button{
width:100%;
margin-top:16px;
padding:15px;
border:none;
border-radius:14px;
font-weight:bold;
background:linear-gradient(135deg,#00ff88,#00c96b);
cursor:pointer;
font-size:15px;
}

/* STATUS */
.status{
margin-top:10px;
text-align:center;
font-size:13px;
opacity:0.7;
}
</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="topo">

<div class="voltar" onclick="voltar()">←</div>

<div>
<div class="nome">Criar Barbeiro</div>
<div class="sub">Adicionar novo acesso</div>
</div>

</div>

<!-- FORM -->
<div class="card">

<div class="titulo">💈 Dados</div>

<input id="nome" placeholder="Nome">
<input id="email" placeholder="Email">
<input id="whatsapp" placeholder="WhatsApp">
<input id="senha" type="password" placeholder="Senha">

</div>

<!-- PLANOS -->
<div class="card">

<div class="titulo">💎 Escolher plano</div>

<div class="planos">

<div class="plano" onclick="selecionarPlano(this,'1mes')">
<strong>Plano Mensal</strong>
<span>30 dias de acesso</span>
</div>

<div class="plano" onclick="selecionarPlano(this,'3meses')">
<strong>Plano Trimestral</strong>
<span>90 dias de acesso</span>
</div>

<div class="plano" onclick="selecionarPlano(this,'1ano')">
<strong>Plano Anual</strong>
<span>365 dias de acesso</span>
</div>

</div>

<button onclick="criar()">Criar barbeiro</button>

<div class="status" id="status"></div>

</div>

</div>

<script>

function voltar(){
window.location.href = "master.html";
}

let planoSelecionado = null;

function selecionarPlano(el,plano){
document.querySelectorAll(".plano").forEach(p=>p.classList.remove("ativo"));
el.classList.add("ativo");
planoSelecionado = plano;
}

function criar(){

let nome = document.getElementById("nome").value.trim();
let email = document.getElementById("email").value.trim();
let whatsapp = document.getElementById("whatsapp").value.trim();
let senha = document.getElementById("senha").value.trim();
let status = document.getElementById("status");

if(!nome || !email || !whatsapp || !senha || !planoSelecionado){
status.style.color = "#ff4d4d";
status.innerText = "Preencha tudo e escolha um plano";
return;
}

let barbeiros = JSON.parse(localStorage.getItem("barbeiros")) || [];

let id = Date.now().toString();

let dias = {
"1mes":30,
"3meses":90,
"1ano":365
};

let validade = new Date();
validade.setDate(validade.getDate() + dias[planoSelecionado]);

let novo = {
id,
nome,
email,
whatsapp,
senha,
plano: planoSelecionado,
validade,
servicos: [],
horarios: [],
agendamentos: [],
clientes: [],
mensagens: [],
pix: {}
};

barbeiros.push(novo);

localStorage.setItem("barbeiros", JSON.stringify(barbeiros));
localStorage.setItem("barbeiroAtual", id);

status.style.color = "#00ff88";
status.innerText = "Barbeiro criado com sucesso 🚀";

setTimeout(()=>{
window.location.href = "painel.html";
},1200);

}

</script>

</body>
</html>
