<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Renovação</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial;
background:#0b141a;
color:#fff;
display:flex;
justify-content:center;
}

.container{
width:100%;
max-width:520px;
padding:16px;
}

/* HEADER */
.header{
background: linear-gradient(145deg,#1a242c,#111b21);
padding:18px;
border-radius:20px;
margin-bottom:16px;
display:flex;
justify-content:space-between;
align-items:center;
}

.titulo{font-size:18px;font-weight:bold;}
.sub{font-size:12px;opacity:0.6;}

.voltar{
background:#0f1720;
width:38px;height:32px;
border-radius:10px;
display:flex;align-items:center;justify-content:center;
cursor:pointer;
}

/* CARD PLANO */
.card-plano{
background: linear-gradient(145deg,#111b21,#1b2631);
padding:20px;
border-radius:20px;
margin-bottom:16px;
border:1px solid rgba(255,255,255,0.05);
}

.plano-top{
display:flex;
justify-content:space-between;
align-items:center;
}

.plano-nome{
font-size:16px;
font-weight:bold;
}

.plano-status{
font-size:11px;
padding:5px 10px;
border-radius:10px;
background:#00ff88;
color:#000;
}

.plano-dias{
margin-top:10px;
font-size:14px;
opacity:0.8;
}

/* GRID */
.planos{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:14px;
}

/* CARD */
.card{
background: linear-gradient(145deg,#1a242c,#111b21);
padding:22px;
border-radius:20px;
text-align:center;
position:relative;
transition:0.3s;
cursor:pointer;
min-height:150px;
display:flex;
flex-direction:column;
justify-content:space-between;
}

/* HOVER */
.card:hover{
transform:translateY(-6px) scale(1.04);
box-shadow:0 20px 40px rgba(0,255,136,0.12);
}

/* DESTAQUE */
.destaque{
border:1px solid #00ff88;
}

/* BADGE NOVO (REFINADO) */
.badge{
position:absolute;
top:-8px;
left:50%;
transform:translateX(-50%);
background:#0f1720;
color:#00ff88;
font-size:10px;
padding:3px 10px;
border-radius:20px;
font-weight:600;
border:1px solid rgba(0,255,136,0.3);
}

/* TEXTO */
.nome{
font-size:14px;
opacity:0.9;
}

.preco{
font-size:22px;
color:#00ff88;
margin:10px 0;
font-weight:bold;
}

/* BOTÃO */
button{
width:100%;
padding:10px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#00ff88,#00c96b);
color:#000;
font-weight:bold;
cursor:pointer;
font-size:13px;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
}

/* MODAL */
.modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
}

.modal-box{
background:#1a242c;
padding:24px;
border-radius:20px;
width:90%;
max-width:330px;
text-align:center;
}

.pix{
background:#0f1720;
padding:12px;
border-radius:12px;
margin-top:12px;
font-size:13px;
}

.btn-copy{background:#0f1720;color:#fff;margin-top:10px;}
.btn-whats{background:#25D366;color:#fff;margin-top:6px;}
.fechar{background:#ff4d4d;margin-top:10px;color:#fff;}
</style>
</head>

<body>

<div class="container">

<div class="header">
<div>
<div class="titulo">Renovação</div>
<div class="sub">Gerenciar plano</div>
</div>
<div class="voltar" onclick="voltar()">←</div>
</div>

<!-- PLANO ATUAL -->
<div class="card-plano">
<div class="plano-top">
<div class="plano-nome" id="planoAtual">Sem plano</div>
<div class="plano-status" id="statusPlano">--</div>
</div>

<div class="plano-dias" id="diasRestantes">
Nenhum plano ativo
</div>
</div>

<!-- PLANOS -->
<div class="planos">

<div class="card">
<div>
<div class="nome">Mensal</div>
<div class="preco" id="preco30"></div>
</div>
<button onclick="abrirModal('Mensal',config.mensal)">Ativar plano</button>
</div>

<div class="card destaque">
<div class="badge">Mais popular</div>

<div>
<div class="nome">3 Meses</div>
<div class="preco" id="preco90"></div>
</div>

<button onclick="abrirModal('Trimestral',config.trimestral)">Ativar plano</button>
</div>

<div class="card">
<div>
<div class="nome">Anual</div>
<div class="preco" id="preco365"></div>
</div>
<button onclick="abrirModal('Anual',config.anual)">Ativar plano</button>
</div>

</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box">

<h3 id="tituloPlano"></h3>
<p id="valorPlano"></p>

<div class="pix" id="pixBox"></div>

<button class="btn-copy" onclick="copiar()">Copiar PIX</button>
<button class="btn-whats" onclick="enviarWhats()">Já paguei</button>
<button class="fechar" onclick="fecharModal()">Fechar</button>

</div>
</div>

<script>

let config = JSON.parse(localStorage.getItem("configRenovacao")) || {
mensal:29,
trimestral:79,
anual:199,
pix:"12345678909"
};

preco30.innerText = "R$ " + config.mensal;
preco90.innerText = "R$ " + config.trimestral;
preco365.innerText = "R$ " + config.anual;

let chavePix = config.pix;

// DADOS
let dados = JSON.parse(localStorage.getItem("barbeiros")) || [];
let id = localStorage.getItem("barbeiroAtual");
let b = dados.find(x => x.id == id) || {};

function atualizarPlano(){

if(!b.validade){
planoAtual.innerText = "Sem plano";
statusPlano.innerText = "Inativo";
statusPlano.style.background = "#ff4d4d";
diasRestantes.innerText = "Nenhum plano ativo";
return;
}

let diff = new Date(b.validade) - new Date();

if(diff <= 0){
planoAtual.innerText = "Expirado";
statusPlano.innerText = "Expirado";
statusPlano.style.background = "#ff4d4d";
diasRestantes.innerText = "Renove seu plano";
return;
}

let dias = Math.floor(diff / 86400000);

planoAtual.innerText = "Plano ativo";
statusPlano.innerText = "Ativo";
statusPlano.style.background = "#00ff88";

diasRestantes.innerText = dias + " dias restantes";

}

setInterval(atualizarPlano,1000);
atualizarPlano();

function mascarar(chave){
return chave.length > 20 ? chave.slice(0,8)+"..."+chave.slice(-4) : chave;
}

function abrirModal(plano, valor){
tituloPlano.innerText = "Plano " + plano;
valorPlano.innerText = "R$ " + valor;
pixBox.innerText = mascarar(chavePix);
modal.style.display = "flex";
}

function fecharModal(){
modal.style.display = "none";
}

function copiar(){
navigator.clipboard.writeText(chavePix);
alert("PIX copiado!");
}

function enviarWhats(){
window.open("https://wa.me/5599999999999");
}

function voltar(){
window.location.href = "painel.html";
}

</script>

</body>
</html>
