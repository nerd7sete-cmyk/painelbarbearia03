<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel PRO</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b141a;
color:#fff;
}

.container{
max-width:480px;
margin:auto;
padding:18px;
}

/* 🔥 TOPO PREMIUM (CLICÁVEL) */
.topo{
background: linear-gradient(145deg,#1a242c,#0f1a20);
padding:20px;
border-radius:20px;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:26px;
border:1px solid rgba(255,255,255,0.06);
box-shadow:
0 10px 30px rgba(0,0,0,0.7),
inset 0 0 20px rgba(255,255,255,0.02);
position:relative;
overflow:hidden;
cursor:pointer;
transition:0.2s;
}

.topo:hover{
transform:scale(1.01);
}

/* brilho suave */
.topo::before{
content:"";
position:absolute;
top:0;
left:-50%;
width:200%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.05),transparent);
animation:shine 6s linear infinite;
}

@keyframes shine{
0%{left:-50%}
100%{left:100%}
}

.user{
display:flex;
align-items:center;
gap:12px;
}

.avatar{
width:58px;
height:58px;
border-radius:50%;
background:linear-gradient(145deg,#00ff88,#00c96b);
display:flex;
align-items:center;
justify-content:center;
color:#000;
font-weight:bold;
font-size:20px;
box-shadow:0 0 20px rgba(0,255,136,0.5);
}

.nome{
font-size:18px;
font-weight:700;
letter-spacing:0.3px;
}

.sub{
font-size:12px;
opacity:0.6;
margin-top:2px;
}

/* botão premium */
.logout{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
color:#fff;
padding:10px 16px;
border-radius:14px;
cursor:pointer;
font-size:12px;
transition:0.3s;
backdrop-filter: blur(6px);
}

.logout:hover{
background:#ff3b3b;
border-color:#ff3b3b;
transform:scale(1.05);
}

.logout.ativo{
background:#ff3b3b;
border-color:#ff3b3b;
transform:scale(0.95);
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
}

/* CARD */
.card{
padding:22px;
border-radius:22px;
background: linear-gradient(145deg,#1a242c,#111b21);
border:1px solid rgba(255,255,255,0.05);
cursor:pointer;
transition: all 0.25s ease;
display:flex;
gap:14px;
align-items:center;
position:relative;
min-height:85px;
box-shadow:0 6px 18px rgba(0,0,0,0.4);
}

.card:hover{
transform: translateY(-6px);
box-shadow:0 12px 25px rgba(0,0,0,0.7);
}

.card::after{
content:"";
position:absolute;
bottom:0;
left:0;
width:100%;
height:3px;
background:linear-gradient(90deg,#00ff88,#00c96b);
opacity:0.7;
border-radius:0 0 22px 22px;
}

/* ÍCONE */
.icon{
width:40px;
height:40px;
display:flex;
align-items:center;
justify-content:center;
opacity:0.85;
}

.icon svg{
width:22px;
height:22px;
stroke:#e5e7eb;
stroke-width:1.8;
fill:none;
}

.texto{
display:flex;
flex-direction:column;
}

.titulo{
font-size:15px;
font-weight:700;
}

.subinfo{
font-size:13px;
opacity:0.7;
margin-top:4px;
}

.valor{
color:#00ff88;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<!-- 🔥 CLIQUE AQUI ABRE PERFIL -->
<div class="topo" onclick="abrirPerfil()">

<div class="user">
<div class="avatar" id="iniciais">B</div>
<div>
<div class="nome" id="saudacao">Carregando...</div>
<div class="sub">Painel profissional</div>
</div>
</div>

<!-- 🔥 IMPORTANTE: impedir clique subir -->
<button class="logout" onclick="event.stopPropagation(); logout()">Sair</button>

</div>

<div class="grid" id="grid"></div>

</div>

<script>

// 🔥 NOVO
function abrirPerfil(){
window.location.href = "perfil.html";
}

function ir(pagina){
window.location.href = "./" + pagina;
}

function logout(){
let btn = document.querySelector(".logout");

btn.classList.add("ativo");
btn.innerText = "Saindo...";

setTimeout(()=>{
localStorage.removeItem("barbeiroAtual");
window.location.href = "./login.html";
}, 600);
}

//////////////////////////////////////////////////
// ICONES
//////////////////////////////////////////////////

function getIcon(titulo){

const icons = {

"Pendentes":`<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5"/><circle cx="12" cy="16" r="1"/></svg>`,

"Faturamento":`<svg viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="12" rx="2"/><circle cx="12" cy="12" r="3"/></svg>`,

"Horários":`<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>`,

"Clientes":`<svg viewBox="0 0 24 24"><circle cx="9" cy="8" r="3"/><circle cx="17" cy="8" r="3"/><path d="M2 20c1-4 6-4 7-4s6 0 7 4"/></svg>`,

"Link":`<svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 1 0-7l1-1a5 5 0 0 1 7 7l-1 1"/><path d="M14 11a5 5 0 0 1 0 7l-1 1a5 5 0 0 1-7-7l1-1"/></svg>`,

"Mensagens":`<svg viewBox="0 0 24 24"><path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/></svg>`,

"Serviços":`<svg viewBox="0 0 24 24"><path d="M14 3l7 7-4 4-7-7z"/><path d="M3 21l6-6"/></svg>`,

"Fidelidade":`<svg viewBox="0 0 24 24"><path d="M12 2l3 6 6 .9-4.5 4.4L18 20l-6-3-6 3 1.5-6.7L3 8.9 9 8z"/></svg>`,

"Integração PIX":`<svg viewBox="0 0 24 24"><path d="M12 2l4 4-4 4-4-4z"/><path d="M12 14l4 4-4 4-4-4z"/></svg>`,

"Assinatura":`<svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 3v6h-6"/></svg>`

};

return icons[titulo] || "";
}

//////////////////////////////////////////////////
// RESTO IGUAL
//////////////////////////////////////////////////

let dados = JSON.parse(localStorage.getItem("barbeiros")) || [];
let id = localStorage.getItem("barbeiroAtual");
let b = dados.find(x => x.id == id) || { nome:"Barbeiro", agendamentos:[], servicos:[] };

let menus = [
{ titulo:"Pendentes", sub:"0 aguardando", link:"pendentes.html" },
{ titulo:"Faturamento", sub:"R$ 0 hoje", link:"faturamento.html" },
{ titulo:"Horários", sub:"Agenda disponível", link:"horarios.html" },
{ titulo:"Clientes", sub:"Lista de clientes", link:"clientes.html" },
{ titulo:"Link", sub:"Divulgar link", link:"link.html" },
{ titulo:"Mensagens", sub:"Automação ativa", link:"mensagem.html" },
{ titulo:"Serviços", sub:"Editar serviços", link:"servicos-planos.html" },
{ titulo:"Fidelidade", sub:"Programa ativo", link:"fidelidade.html" },
{ titulo:"Integração PIX", sub:"Configurar seu pix", link:"pix.html" },
{ titulo:"Assinatura", sub:"Renovar assinatura", link:"renovacao.html" }
];

function renderMenu(){
let grid = document.getElementById("grid");
grid.innerHTML = "";

menus.forEach(m=>{
let card = document.createElement("div");
card.className = "card";
card.onclick = ()=> ir(m.link);

card.innerHTML = `
<div class="icon">${getIcon(m.titulo)}</div>
<div class="texto">
<div class="titulo">${m.titulo}</div>
<div class="subinfo ${m.titulo === 'Faturamento' ? 'valor' : ''}">${m.sub}</div>
</div>
`;

grid.appendChild(card);
});
}

function renderSaudacao(){
let nome = b.nome || "Barbeiro";
let h = new Date().getHours();

let saudacao =
h < 12 ? "Bom dia" :
h < 18 ? "Boa tarde" :
"Boa noite";

document.getElementById("saudacao").innerText = `${saudacao}, ${nome}`;
document.getElementById("iniciais").innerText = nome.charAt(0).toUpperCase();
}

function renderPendentes(){
let pendentes = (b.agendamentos || []).filter(a=>a.status !== "aprovado");
let menu = menus.find(m=>m.titulo === "Pendentes");
if(menu) menu.sub = `${pendentes.length} aguardando`;
}

function renderFaturamento(){
let hoje = new Date().toDateString();
let total = 0;

(b.agendamentos || []).forEach(a=>{
let d = new Date(a.data).toDateString();
if(d === hoje && a.status === "aprovado"){
let s = (b.servicos || []).find(x=>x.nome===a.servico);
if(s) total += Number(s.preco || 0);
}
});

let menu = menus.find(m=>m.titulo === "Faturamento");
if(menu) menu.sub = `R$ ${total.toFixed(2)} hoje`;
}

renderSaudacao();
renderPendentes();
renderFaturamento();
renderMenu();

</script>

</body>
</html>
