<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Saindo...</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:#0b141a;
color:#fff;
font-family:Arial;
}

/* 🔥 loader */
.loader{
width:50px;
height:50px;
border:4px solid rgba(255,255,255,0.1);
border-top:4px solid #00ff88;
border-radius:50%;
animation:spin 1s linear infinite;
margin-bottom:20px;
}

@keyframes spin{
to{transform:rotate(360deg);}
}

/* texto */
.texto{
font-size:15px;
opacity:0.7;
}

/* efeito fade */
body{
animation:fade 0.4s ease;
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}
</style>
</head>

<body>

<div class="loader"></div>
<div class="texto">Saindo do painel...</div>

<script>

// limpa login
localStorage.removeItem("barbeiroAtual");

// simula carregamento
setTimeout(()=>{
window.location.href = "login.html";
},1500);

</script>

</body>
</html>
