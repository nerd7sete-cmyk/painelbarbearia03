<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agendamento</title>

<style>
* { box-sizing: border-box; }

body {
margin: 0;
background: #0b141a;
font-family: Arial, sans-serif;
color: #fff;
}

/* CHAT */
.chat {
padding: 12px;
display: flex;
flex-direction: column;
gap: 10px;
padding-bottom: 90px;
}

/* MENSAGENS */
.msg {
max-width: 85%;
padding: 10px 12px;
border-radius: 12px;
font-size: 14px;
line-height: 1.4;
word-wrap: break-word;
}

.bot {
background: #202c33;
align-self: flex-start;
}

.user {
background: #005c4b;
align-self: flex-end;
}

/* HORA */
.hora {
font-size: 10px;
opacity: 0.6;
margin-top: 4px;
text-align: right;
}

/* DIGITANDO */
.typing {
background: #202c33;
padding: 10px;
border-radius: 12px;
width: 60px;
}

.typing span {
display: inline-block;
width: 6px;
height: 6px;
background: #fff;
border-radius: 50%;
margin: 2px;
animation: blink 1.4s infinite;
}

.typing span:nth-child(2){ animation-delay: 0.2s; }
.typing span:nth-child(3){ animation-delay: 0.4s; }

@keyframes blink {
0%,80%,100%{opacity:0;}
40%{opacity:1;}
}

/* INPUT */
.input-area {
position: fixed;
bottom: 0;
width: 100%;
background: #202c33;
padding: 8px;
display: flex;
gap: 8px;
align-items: center;
}

input {
flex: 1;
padding: 12px;
border-radius: 25px;
border: none;
background: #2a3942;
color: #fff;
font-size: 14px;
}

button {
width: 45px;
height: 45px;
border-radius: 50%;
border: none;
background: #00a884;
color: #fff;
font-size: 16px;
}
</style>
</head>

<body>

<div class="chat" id="chat"></div>

<div class="input-area">
<input type="text" id="input" placeholder="Digite sua mensagem">
<button onclick="enviar()">➤</button>
</div>

<script>

//////////////////////////////////////////////////
// 🔥 DADOS BARBEIRO
//////////////////////////////////////////////////

let barbeiros = JSON.parse(localStorage.getItem("barbeiros")) || [];
let id = localStorage.getItem("barbeiroAtual");
let b = barbeiros.find(x => x.id == id);

//////////////////////////////////////////////////
// 🔥 CONTROLE
//////////////////////////////////////////////////

let etapa = 0;
let nome = "";
let whatsapp = "";

const chat = document.getElementById("chat");

//////////////////////////////////////////////////
// 🔥 COPY
//////////////////////////////////////////////////

let msg1 = "👋 Olá, tudo bem?";
let msg2 = "💈 Seja bem-vindo! Vou te ajudar a agendar seu horário de forma rápida e prática.";
let msg3 = "✍️ Para começarmos, me informe seu nome completo:";
let msg4 = "Perfeito";
let msg5 = "📲 Agora me informe seu WhatsApp para confirmação do agendamento.";

//////////////////////////////////////////////////
// 🔥 HORA
//////////////////////////////////////////////////

function horaAtual(){
let d = new Date();
return d.getHours().toString().padStart(2,'0') + ":" +
       d.getMinutes().toString().padStart(2,'0');
}

//////////////////////////////////////////////////
// 🔥 MSG BOT
//////////////////////////////////////////////////

function msgBot(texto){
let div = document.createElement("div");
div.className = "msg bot";
div.innerHTML = texto + `<div class="hora">${horaAtual()}</div>`;
chat.appendChild(div);
chat.scrollTop = chat.scrollHeight;
}

//////////////////////////////////////////////////
// 🔥 MSG USER
//////////////////////////////////////////////////

function msgUser(texto){
let div = document.createElement("div");
div.className = "msg user";
div.innerHTML = texto + `<div class="hora">${horaAtual()}</div>`;
chat.appendChild(div);
chat.scrollTop = chat.scrollHeight;
}

//////////////////////////////////////////////////
// 🔥 DIGITANDO
//////////////////////////////////////////////////

function typing(callback){
let div = document.createElement("div");
div.className = "typing";
div.innerHTML = "<span></span><span></span><span></span>";
chat.appendChild(div);

setTimeout(()=>{
div.remove();
callback();
},800);
}

//////////////////////////////////////////////////
// 🔥 INICIO
//////////////////////////////////////////////////

function iniciar(){
setTimeout(()=> typing(()=> msgBot(msg1)), 500);
setTimeout(()=> typing(()=> msgBot(msg2)), 1800);
setTimeout(()=> typing(()=> msgBot(msg3)), 3000);
}

//////////////////////////////////////////////////
// 🔥 ENVIAR
//////////////////////////////////////////////////

function enviar(){

let input = document.getElementById("input");
let valor = input.value.trim();

if(!valor) return;

msgUser(valor);
input.value = "";

// NOME
if(etapa === 0){

nome = valor;

localStorage.setItem("nomeCliente", nome);

setTimeout(()=> typing(()=> msgBot(`${msg4}, ${nome} 👊`)), 800);
setTimeout(()=> typing(()=> msgBot(msg5)), 2000);

input.placeholder = "Digite seu WhatsApp";
etapa = 1;

// WHATS
}else if(etapa === 1){

if(valor.length < 10){
msgBot("❌ Digite um WhatsApp válido");
return;
}

whatsapp = valor;

localStorage.setItem("whatsappCliente", whatsapp);

// 🔥 CRIA BASE DO AGENDAMENTO
let agendamentoTemp = {
nome,
whatsapp
};

localStorage.setItem("agendamentoTemp", JSON.stringify(agendamentoTemp));

setTimeout(()=> typing(()=> msgBot("🚀 Tudo certo! Agora vamos escolher seu serviço 👇")), 800);

// 🔥 IR PRA SERVIÇOS
setTimeout(()=>{
window.location.href = "servicos.html";
},2000);

}
}

iniciar();

</script>

</body>
</html>
